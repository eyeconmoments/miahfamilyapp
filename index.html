                      <div className="flex-1">
                        <div className="flex justify-between text-sm mb-1">
                          <span className="font-medium">{u.name}</span>
                          <span className="font-bold" style={{ color: uScore === 5 ? '#10b981' : uScore >= 3 ? '#f59e0b' : '#6b7280' }}>
                            {uScore}/5 pts
                          </span>
                        </div>
                        <div className="h-1.5 rounded-full" style={{ background: '#2c2c2e' }}>
                          <div className="h-1.5 rounded-full transition-all" style={{ width: `${(uScore/5)*100}%`, background: uScore === 5 ? '#10b981' : uScore >= 3 ? '#f59e0b' : '#6b7280' }}/>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

        </div>
      );
    }

    // ─── Bills Tab ────────────────────────────────────────────────────
    function BillsTab() {
      const [bills, setBills] = useState([]);
      const [payments, setPayments] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [editing, setEditing] = useState(null);
      const [deleteConfirm, setDeleteConfirm] = useState(null);
      const [form, setForm] = useState({ name: '', amount: '', due_day: '', category: 'bill' });
      const [seeded, setSeeded] = useState(false);

      const my = monthYearStr();
      const today = new Date();
      const currentDay = today.getDate();
      const monthName = today.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

      const fetchAll = useCallback(async () => {
        const [{ data: b }, { data: p }] = await Promise.all([
          db.from('bills').select('*').eq('is_active', true).order('due_day'),
          db.from('bill_payments').select('*').eq('month_year', my),
        ]);
        setBills(b || []);
        setPayments(p || []);
      }, [my]);

      // Auto-seed sample data if table is empty
      const maybeSeed = useCallback(async () => {
        const { data } = await db.from('bills').select('id').limit(1);
        if (!data || data.length === 0) {
          await db.from('bills').insert(SAMPLE_BILLS.map(b => ({ ...b, is_active: true })));
        }
        setSeeded(true);
      }, []);

      useEffect(() => { maybeSeed(); }, []);
      useEffect(() => { if (seeded) fetchAll(); }, [seeded, fetchAll]);

      const paidIds = new Set(payments.map(p => p.bill_id));
      const totalOut = bills.reduce((s, b) => s + parseFloat(b.amount || 0), 0);
      const paidAmt = payments.reduce((s, p) => s + parseFloat(p.amount_paid || 0), 0);
      const remaining = totalOut - paidAmt;
      const paidCount = bills.filter(b => paidIds.has(b.id)).length;

      const openAdd = () => {
        setForm({ name: '', amount: '', due_day: '', category: 'bill' });
        setEditing(null);
        setShowAdd(true);
      };

      const openEdit = bill => {
        setForm({ name: bill.name, amount: String(bill.amount), due_day: String(bill.due_day), category: bill.category || 'bill' });
        setEditing(bill);
        setShowAdd(true);
      };

      const saveBill = async () => {
        if (!form.name.trim() || !form.amount || !form.due_day) return;
        const payload = {
          name: form.name.trim(),
          amount: parseFloat(form.amount),
          due_day: parseInt(form.due_day),
          category: form.category,
        };
        if (editing) {
          await db.from('bills').update(payload).eq('id', editing.id);
        } else {
          await db.from('bills').insert({ ...payload, is_active: true });
        }
        setShowAdd(false);
        setEditing(null);
        fetchAll();
      };

      const deleteBill = async id => {
        await db.from('bills').update({ is_active: false }).eq('id', id);
        setDeleteConfirm(null);
        fetchAll();
      };

      const markPaid = async bill => {
        if (paidIds.has(bill.id)) {
          await db.from('bill_payments').delete().eq('bill_id', bill.id).eq('month_year', my);
        } else {
          await db.from('bill_payments').insert({
            bill_id: bill.id,
            paid_date: todayStr(),
            amount_paid: bill.amount,
            month_year: my,
          });
        }
        fetchAll();
      };

      const catStyle = cat => CAT_STYLE[cat] || CAT_STYLE.other;

      return (
        <div className="tab-content safe-bottom">
          {/* Header */}
          <div className="px-4 pt-14 pb-4">
            <h2 className="text-2xl font-bold">Bills & Direct Debits</h2>
            <p className="text-sm mt-0.5" style={{ color: '#8e8e93' }}>{monthName}</p>
          </div>

          {/* Summary Card */}
          <div className="mx-4 rounded-2xl p-4 mb-4" style={{ background: '#1c1c1e' }}>
            <div className="grid grid-cols-3 gap-1 text-center mb-3">
              <div>
                <p className="text-xl font-bold">{fmtGBP(totalOut)}</p>
                <p className="text-xs mt-0.5" style={{ color: '#8e8e93' }}>Total going out</p>
              </div>
              <div>
                <p className="text-xl font-bold" style={{ color: '#10b981' }}>{fmtGBP(paidAmt)}</p>
                <p className="text-xs mt-0.5" style={{ color: '#8e8e93' }}>Paid</p>
              </div>
              <div>
                <p className="text-xl font-bold" style={{ color: remaining > 0 ? '#f59e0b' : '#6b7280' }}>{fmtGBP(remaining)}</p>
                <p className="text-xs mt-0.5" style={{ color: '#8e8e93' }}>Remaining</p>
              </div>
            </div>
            <div className="h-2 rounded-full mb-1.5" style={{ background: '#2c2c2e' }}>
              <div className="h-2 rounded-full transition-all" style={{ background: '#10b981', width: totalOut > 0 ? `${Math.min((paidAmt / totalOut) * 100, 100)}%` : '0%' }} />
            </div>
            <p className="text-center text-xs" style={{ color: '#6b7280' }}>{paidCount} of {bills.length} bills paid</p>
          </div>

          {/* Bills list */}
          <div className="px-4">
            {bills.length === 0 && seeded ? (
              <div className="text-center py-16">
                <p className="text-5xl mb-4">💳</p>
                <p className="font-semibold text-lg mb-2">No bills yet</p>
                <p className="text-sm mb-6" style={{ color: '#6b7280' }}>Add your first bill to start tracking</p>
                <button onClick={openAdd} className="px-6 py-3 rounded-xl font-semibold" style={{ background: '#10b981', color: '#fff' }}>
                  + Add First Bill
                </button>
              </div>
            ) : (
              <div className="space-y-3">
                {bills.map(bill => {
                  const isPaid = paidIds.has(bill.id);
                  const isToday2 = bill.due_day === currentDay;
                  const isOverdue = bill.due_day < currentDay && !isPaid;
                  const isDueSoon = bill.due_day > currentDay && bill.due_day <= currentDay + 7 && !isPaid;
                  const cs = catStyle(bill.category);

                  return (
                    <div
                      key={bill.id}
                      className="rounded-2xl p-4 transition-all"
                      style={{
                        background: isPaid ? '#111' : '#1c1c1e',
                        border: `1px solid ${isOverdue ? '#7f1d1d' : isToday2 && !isPaid ? '#78350f' : '#2c2c2e'}`,
                        opacity: isPaid ? 0.65 : 1,
                      }}
                    >
                      {/* Top row */}
                      <div className="flex items-start gap-3">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 flex-wrap mb-1.5">
                            <p className={`font-semibold ${isPaid ? 'line-through' : ''}`} style={{ color: isPaid ? '#6b7280' : '#fff' }}>
                              {bill.name}
                            </p>
                            {isOverdue && !isPaid && (
                              <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: '#7f1d1d', color: '#fca5a5' }}>Overdue</span>
                            )}
                            {isToday2 && !isPaid && (
                              <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: '#78350f', color: '#fcd34d' }}>Due today</span>
                            )}
                            {isDueSoon && (
                              <span className="text-xs px-2 py-0.5 rounded-full" style={{ background: '#1c1917', color: '#d6d3d1' }}>Due {ordinal(bill.due_day)}</span>
                            )}
                          </div>
                          <div className="flex items-center gap-2 flex-wrap">
                            <span
                              className="text-xs px-2 py-0.5 rounded-full font-medium"
                              style={{ background: cs.bg, color: cs.text, border: `1px solid ${cs.border}` }}
                            >
                              {bill.category}
                            </span>
                            {!isDueSoon && !isToday2 && !isOverdue && (
                              <span className="text-xs" style={{ color: '#6b7280' }}>due {ordinal(bill.due_day)}</span>
                            )}
                          </div>
                        </div>
                        <div className="text-right flex-shrink-0">
                          <p className="text-xl font-bold">{fmtGBP(bill.amount)}</p>
                          <p className="text-xs" style={{ color: '#6b7280' }}>/month</p>
                        </div>
                      </div>

                      {/* Action row */}
                      <div className="flex gap-2 mt-3">
                        <button
                          onClick={() => markPaid(bill)}
                          className="flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all active:scale-95"
                          style={{
                            background: isPaid ? '#052e16' : '#10b981',
                            color: isPaid ? '#6ee7b7' : '#fff',
                            border: isPaid ? '1px solid #059669' : 'none',
                          }}
                        >
                          {isPaid ? '✓ Paid' : 'Mark Paid'}
                        </button>
                        <button
                          onClick={() => openEdit(bill)}
                          className="px-3.5 py-2.5 rounded-xl text-sm transition-all active:scale-95"
                          style={{ background: '#2c2c2e', color: '#9ca3af' }}
                        >✏️</button>
                        <button
                          onClick={() => setDeleteConfirm(bill.id)}
                          className="px-3.5 py-2.5 rounded-xl text-sm transition-all active:scale-95"
                          style={{ background: '#2c2c2e', color: '#9ca3af' }}
                        >🗑️</button>
                      </div>
                    </div>
                  );
                })}

                {/* Add button */}
                <button
                  onClick={openAdd}
                  className="w-full py-4 rounded-2xl text-sm font-semibold transition-all active:scale-98"
                  style={{ border: '1px dashed #374151', color: '#10b981' }}
                >
                  + Add Bill or Direct Debit
                </button>
              </div>
            )}
          </div>

          {/* Add / Edit modal */}
          {showAdd && (
            <Modal title={editing ? 'Edit Bill' : 'Add Bill'} onClose={() => { setShowAdd(false); setEditing(null); }}>
              <div className="space-y-4 pb-2">
                <Field label="Bill / Direct Debit name">
                  <input
                    value={form.name}
                    onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                    placeholder="e.g. Virgin Media, Mortgage…"
                    className={inputCls}
                    style={inputStyle}
                  />
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Amount (£)">
                    <input
                      type="number" step="0.01" min="0"
                      value={form.amount}
                      onChange={e => setForm(f => ({ ...f, amount: e.target.value }))}
                      placeholder="0.00"
                      className={inputCls}
                      style={inputStyle}
                    />
                  </Field>
                  <Field label="Day of month due">
                    <input
                      type="number" min="1" max="31"
                      value={form.due_day}
                      onChange={e => setForm(f => ({ ...f, due_day: e.target.value }))}
                      placeholder="1–31"
                      className={inputCls}
                      style={inputStyle}
                    />
                  </Field>
                </div>
                <Field label="Category">
                  <select
                    value={form.category}
                    onChange={e => setForm(f => ({ ...f, category: e.target.value }))}
                    className={inputCls}
                    style={inputStyle}
                  >
                    {CATEGORIES.map(c => (
                      <option key={c} value={c}>{c.charAt(0).toUpperCase() + c.slice(1)}</option>
                    ))}
                  </select>
                </Field>
                <button
                  onClick={saveBill}
                  className="w-full py-3.5 rounded-xl font-semibold mt-2 transition-all active:scale-98"
                  style={{ background: '#10b981', color: '#fff' }}
                >
                  {editing ? 'Save Changes' : 'Add Bill'}
                </button>
              </div>
            </Modal>
          )}

          {/* Delete confirm */}
          {deleteConfirm && (
            <Modal title="Delete Bill?" onClose={() => setDeleteConfirm(null)}>
              <p className="text-sm mb-5" style={{ color: '#9ca3af' }}>
                This will remove the bill and all payment history for it. This cannot be undone.
              </p>
              <div className="flex gap-3">
                <button
                  onClick={() => setDeleteConfirm(null)}
                  className="flex-1 py-3 rounded-xl font-semibold"
                  style={{ background: '#2c2c2e', color: '#fff' }}
                >Cancel</button>
                <button
                  onClick={() => deleteBill(deleteConfirm)}
                  className="flex-1 py-3 rounded-xl font-semibold"
                  style={{ background: '#dc2626', color: '#fff' }}
                >Delete</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ─── Tasks Tab ────────────────────────────────────────────────────
    function TasksTab({ user, allUsers, noPadTop }) {
      const [tasks, setTasks] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [form, setForm] = useState({ title: '', assigned_to: '', due_date: '', recurrence: '' });
      const [filter, setFilter] = useState('all'); // all | mine

      const fetchTasks = () => {
        db.from('family_tasks').select('*').order('due_date', { ascending: true, nullsFirst: false }).order('created_at')
          .then(({ data }) => setTasks(data || []));
      };

      useEffect(() => { fetchTasks(); }, []);

      const toggle = async task => {
        await db.from('family_tasks').update({ completed: !task.completed, last_done: todayStr() }).eq('id', task.id);
        fetchTasks();
      };

      const addTask = async () => {
        if (!form.title.trim()) return;
        await db.from('family_tasks').insert({
          title: form.title.trim(),
          assigned_to: form.assigned_to || null,
          due_date: form.due_date || null,
          recurrence: form.recurrence || null,
          completed: false,
        });
        setForm({ title: '', assigned_to: '', due_date: '', recurrence: '' });
        setShowAdd(false);
        fetchTasks();
      };

      const deleteTask = async id => {
        await db.from('family_tasks').delete().eq('id', id);
        fetchTasks();
      };

      const getUserName = id => allUsers.find(u => u.id === id)?.name || '';

      let displayed = filter === 'mine'
        ? tasks.filter(t => t.assigned_to === user.id || !t.assigned_to)
        : tasks;

      const pending = displayed.filter(t => !t.completed);
      const done = displayed.filter(t => t.completed);
      const today2 = todayStr();

      const TaskRow = ({ task }) => {
        const assignee = getUserName(task.assigned_to);
        const isOverdue = task.due_date && task.due_date < today2 && !task.completed;
        return (
          <div
            className="rounded-2xl px-4 py-3 flex items-start gap-3 transition-all"
            style={{ background: '#1c1c1e', opacity: task.completed ? 0.55 : 1 }}
          >
            <button onClick={() => toggle(task)} className="mt-0.5 flex-shrink-0">
              <div
                className="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all"
                style={{ background: task.completed ? '#10b981' : 'transparent', borderColor: task.completed ? '#10b981' : '#4b5563' }}
              >
                {task.completed && <span className="text-xs text-white font-bold">✓</span>}
              </div>
            </button>
            <div className="flex-1 min-w-0">
              <p className={`text-sm font-medium leading-snug ${task.completed ? 'line-through' : ''}`} style={{ color: task.completed ? '#6b7280' : '#fff' }}>
                {task.title}
              </p>
              <div className="flex flex-wrap items-center gap-2 mt-1">
                {assignee && <span className="text-xs" style={{ color: '#10b981' }}>👤 {assignee}</span>}
                {task.due_date && (
                  <span className="text-xs" style={{ color: isOverdue ? '#ef4444' : '#6b7280' }}>
                    📅 {new Date(task.due_date + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                    {isOverdue && ' · overdue'}
                  </span>
                )}
                {task.recurrence && (
                  <span className="text-xs px-1.5 py-0.5 rounded-full" style={{ background: '#2e1065', color: '#c4b5fd' }}>🔁 {task.recurrence}</span>
                )}
              </div>
            </div>
            <button onClick={() => deleteTask(task.id)} className="text-xs mt-0.5 px-1" style={{ color: '#4b5563' }}>✕</button>
          </div>
        );
      };

      return (
        <div className="tab-content safe-bottom">
          <div className={`px-4 pb-3 ${noPadTop ? 'pt-3' : 'pt-14'}`}>
            <div className="flex justify-between items-start">
              <div>
                <h2 className="text-2xl font-bold">Tasks</h2>
                <p className="text-sm mt-0.5" style={{ color: '#8e8e93' }}>{pending.length} pending</p>
              </div>
              <button
                onClick={() => { setForm({ title: '', assigned_to: '', due_date: '', recurrence: '' }); setShowAdd(true); }}
                className="px-4 py-2 rounded-xl text-sm font-semibold"
                style={{ background: '#10b981', color: '#fff' }}
              >+ Add</button>
            </div>

            {/* Filter tabs */}
            <div className="flex gap-2 mt-3">
              {[['all', 'All'], ['mine', 'Mine']].map(([val, label]) => (
                <button
                  key={val}
                  onClick={() => setFilter(val)}
                  className="px-4 py-1.5 rounded-xl text-sm font-medium transition-all"
                  style={{ background: filter === val ? '#10b981' : '#2c2c2e', color: filter === val ? '#fff' : '#9ca3af' }}
                >{label}</button>
              ))}
            </div>
          </div>

          <div className="px-4">
            {tasks.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-5xl mb-4">✅</p>
                <p className="font-semibold text-lg mb-2">No tasks yet</p>
                <p className="text-sm mb-6" style={{ color: '#6b7280' }}>Add tasks to stay organised as a family</p>
              </div>
            ) : (
              <>
                {pending.length > 0 && (
                  <div className="space-y-2 mb-4">
                    {pending.map(t => <TaskRow key={t.id} task={t} />)}
                  </div>
                )}
                {done.length > 0 && (
                  <>
                    <p className="text-xs font-medium mb-2" style={{ color: '#6b7280' }}>COMPLETED ({done.length})</p>
                    <div className="space-y-2">
                      {done.slice(0, 8).map(t => <TaskRow key={t.id} task={t} />)}
                    </div>
                  </>
                )}
              </>
            )}
          </div>

          {showAdd && (
            <Modal title="Add Task" onClose={() => setShowAdd(false)}>
              <div className="space-y-4 pb-2">
                <Field label="What needs doing?">
                  <input
                    value={form.title}
                    onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
                    placeholder="Task title…"
                    className={inputCls}
                    style={inputStyle}
                  />
                </Field>
                <Field label="Assign to">
                  <select value={form.assigned_to} onChange={e => setForm(f => ({ ...f, assigned_to: e.target.value }))} className={inputCls} style={inputStyle}>
                    <option value="">Anyone</option>
                    {allUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                  </select>
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Due date">
                    <input type="date" value={form.due_date} onChange={e => setForm(f => ({ ...f, due_date: e.target.value }))} className={inputCls} style={inputStyle} />
                  </Field>
                  <Field label="Repeats">
                    <select value={form.recurrence} onChange={e => setForm(f => ({ ...f, recurrence: e.target.value }))} className={inputCls} style={inputStyle}>
                      <option value="">One-time</option>
                      <option value="daily">Daily</option>
                      <option value="weekly">Weekly</option>
                      <option value="monthly">Monthly</option>
                    </select>
                  </Field>
                </div>
                <button onClick={addTask} className="w-full py-3.5 rounded-xl font-semibold transition-all active:scale-98" style={{ background: '#10b981', color: '#fff' }}>
                  Add Task
                </button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ─── Shopping Tab ─────────────────────────────────────────────────
    function ShoppingTab({ user, allUsers, noPadTop }) {
      const [items, setItems] = useState([]);
      const [newItem, setNewItem] = useState('');
      const inputRef = useRef(null);

      const fetchItems = () => {
        db.from('shopping_items').select('*').order('completed').order('created_at')
          .then(({ data }) => setItems(data || []));
      };

      useEffect(() => { fetchItems(); }, []);

      const addItem = async () => {
        const name = newItem.trim();
        if (!name) return;
        setNewItem('');
        await db.from('shopping_items').insert({ name, added_by: user.id, completed: false });
        fetchItems();
      };

      const toggle = async item => {
        await db.from('shopping_items').update({ completed: !item.completed }).eq('id', item.id);
        fetchItems();
      };

      const deleteItem = async id => {
        await db.from('shopping_items').delete().eq('id', id);
        fetchItems();
      };

      const clearDone = async () => {
        const ids = items.filter(i => i.completed).map(i => i.id);
        if (ids.length) await db.from('shopping_items').delete().in('id', ids);
        fetchItems();
      };

      const getUserName = id => allUsers.find(u => u.id === id)?.name || '';
      const pending = items.filter(i => !i.completed);
      const done = items.filter(i => i.completed);

      return (
        <div className="tab-content safe-bottom">
          <div className={`px-4 pb-3 ${noPadTop ? 'pt-3' : 'pt-14'}`}>
            <div className="flex justify-between items-start">
              <div>
                <h2 className="text-2xl font-bold">Shopping List</h2>
                <p className="text-sm mt-0.5" style={{ color: '#8e8e93' }}>{pending.length} items needed</p>
              </div>
              {done.length > 0 && (
                <button onClick={clearDone} className="text-sm font-medium" style={{ color: '#ef4444' }}>
                  Clear {done.length} done
                </button>
              )}
            </div>
          </div>

          {/* Add input */}
          <div className="px-4 mb-4">
            <div className="flex gap-2">
              <input
                ref={inputRef}
                value={newItem}
                onChange={e => setNewItem(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && addItem()}
                placeholder="Add an item…"
                className="flex-1 px-4 py-3 rounded-xl text-sm"
                style={{ background: '#1c1c1e', color: '#fff', border: '1px solid #2c2c2e' }}
              />
              <button
                onClick={addItem}
                className="px-5 py-3 rounded-xl font-bold text-lg transition-all active:scale-95"
                style={{ background: '#10b981', color: '#fff' }}
              >+</button>
            </div>
          </div>

          <div className="px-4">
            {items.length === 0 ? (
              <div className="text-center py-16">
                <p className="text-5xl mb-4">🛒</p>
                <p className="font-semibold text-lg mb-2">List is empty</p>
                <p className="text-sm" style={{ color: '#6b7280' }}>Type above to add items</p>
              </div>
            ) : (
              <div className="space-y-2">
                {pending.map(item => (
                  <div key={item.id} className="flex items-center gap-3 rounded-xl px-4 py-3" style={{ background: '#1c1c1e' }}>
                    <button onClick={() => toggle(item)}>
                      <div className="w-6 h-6 rounded-full border-2 flex-shrink-0 transition-all" style={{ borderColor: '#4b5563' }} />
                    </button>
                    <div className="flex-1 min-w-0">
                      <p className="text-sm">{item.name}</p>
                      {item.added_by && (
                        <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>
                          Added by {getUserName(item.added_by)}
                        </p>
                      )}
                    </div>
                    <button onClick={() => deleteItem(item.id)} className="text-xs px-1 flex-shrink-0" style={{ color: '#4b5563' }}>✕</button>
                  </div>
                ))}

                {done.length > 0 && (
                  <>
                    <p className="text-xs font-medium pt-1 pb-0.5" style={{ color: '#6b7280' }}>IN BASKET ({done.length})</p>
                    {done.map(item => (
                      <div key={item.id} className="flex items-center gap-3 rounded-xl px-4 py-3" style={{ background: '#111', opacity: 0.6 }}>
                        <button onClick={() => toggle(item)}>
                          <div className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: '#10b981' }}>
                            <span className="text-xs text-white font-bold">✓</span>
                          </div>
                        </button>
                        <p className="flex-1 text-sm line-through" style={{ color: '#6b7280' }}>{item.name}</p>
                        <button onClick={() => deleteItem(item.id)} className="text-xs px-1" style={{ color: '#4b5563' }}>✕</button>
                      </div>
                    ))}
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Wellness Tab ─────────────────────────────────────────────────
    /*
    -- Run in Supabase SQL editor:
    CREATE TABLE family_gym_logs (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id uuid NOT NULL,
      date text NOT NULL,
      UNIQUE(user_id, date)
    );
    CREATE TABLE family_step_logs (
      id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
      user_id uuid NOT NULL,
      date text NOT NULL,
      steps integer DEFAULT 0,
      UNIQUE(user_id, date)
    );
    */
    function WellnessTab({ user, initialTab }) {
      const [innerTab, setInnerTab] = useState(initialTab || 'gym');
      const [gymLogs, setGymLogs] = useState([]);
      const [stepLogs, setStepLogs] = useState([]);
      const [stepInput, setStepInput] = useState('');
      const [liveSteps, setLiveSteps] = useState(0);
      const [counting, setCounting] = useState(false);
      const listenerRef = useRef(null);
      const countRef = useRef(0);
      const lastMagRef = useRef(null);

      useEffect(() => {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 60);
        const cutoffStr = cutoff.toISOString().slice(0, 10);
        Promise.all([
          db.from('family_gym_logs').select('*').eq('user_id', user.id).gte('date', cutoffStr),
          db.from('family_step_logs').select('*').eq('user_id', user.id).gte('date', cutoffStr),
        ]).then(([g, s]) => {
          setGymLogs(g.data || []);
          setStepLogs(s.data || []);
          const t = todayStr();
          const todayStep = (s.data || []).find(r => r.date === t);
          if (todayStep) setStepInput(String(todayStep.steps));
        });
      }, [user.id]);

      const today = todayStr();

      // ── GYM ──
      const wentGym = date => gymLogs.some(r => r.date === date);

      const toggleGym = async date => {
        const existing = gymLogs.find(r => r.date === date);
        if (existing) {
          setGymLogs(prev => prev.filter(r => r.date !== date));
          await db.from('family_gym_logs').delete().eq('id', existing.id);
        } else {
          const row = { user_id: user.id, date };
          setGymLogs(prev => [...prev, row]);
          await db.from('family_gym_logs').upsert([row], { onConflict: 'user_id,date' });
        }
      };

      const getMon = ds => {
        const d = new Date(ds + 'T12:00:00');
        const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
        d.setDate(d.getDate() + diff);
        return d.toISOString().slice(0, 10);
      };

      const thisWeekMon = getMon(today);
      const thisWeekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(thisWeekMon + 'T12:00:00'); d.setDate(d.getDate() + i);
        return d.toISOString().slice(0, 10);
      });
      const wentThisWeek = thisWeekDays.some(ds => wentGym(ds));

      const gymWeekStreak = (() => {
        let s = 0;
        const d = new Date();
        for (let i = 0; i < 52; i++) {
          const mon = getMon(d.toISOString().slice(0, 10));
          const days = Array.from({ length: 7 }, (_, j) => {
            const x = new Date(mon + 'T12:00:00'); x.setDate(x.getDate() + j);
            return x.toISOString().slice(0, 10);
          });
          if (days.some(ds => wentGym(ds))) { s++; d.setDate(d.getDate() - 7); }
          else break;
        }
        return s;
      })();

      const last8Weeks = Array.from({ length: 8 }, (_, i) => {
        const anchor = new Date(); anchor.setDate(anchor.getDate() - i * 7);
        const mon = getMon(anchor.toISOString().slice(0, 10));
        const days = Array.from({ length: 7 }, (_, j) => {
          const d = new Date(mon + 'T12:00:00'); d.setDate(d.getDate() + j);
          return d.toISOString().slice(0, 10);
        });
        return { mon, days, hit: days.some(ds => wentGym(ds)) };
      }).reverse();

      const DAY_LABELS = ['M','T','W','T','F','S','S'];

      // ── STEPS ──
      const STEP_GOAL = 10000;
      const todayStepRec = stepLogs.find(r => r.date === today);
      const todaySteps = todayStepRec?.steps || 0;
      const stepPct = Math.min(100, Math.round((todaySteps / STEP_GOAL) * 100));

      const last14 = Array.from({ length: 14 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (13 - i));
        const ds = d.toISOString().slice(0, 10);
        return { ds, steps: (stepLogs.find(r => r.date === ds)?.steps) || 0 };
      });
      const maxSteps = Math.max(STEP_GOAL, ...last14.map(d => d.steps));

      const saveSteps = async steps => {
        const row = { user_id: user.id, date: today, steps: parseInt(steps) || 0 };
        setStepLogs(prev => [...prev.filter(r => r.date !== today), row]);
        await db.from('family_step_logs').upsert([row], { onConflict: 'user_id,date' });
      };

      const startCounter = () => {
        if (!window.DeviceMotionEvent) return alert('Motion sensor not available on this device.');
        countRef.current = 0; lastMagRef.current = null;
        const handler = e => {
          const a = e.accelerationIncludingGravity;
          if (!a) return;
          const mag = Math.sqrt(a.x**2 + a.y**2 + a.z**2);
          if (lastMagRef.current !== null && lastMagRef.current < 11 && mag >= 11) {
            countRef.current += 1; setLiveSteps(countRef.current);
          }
          lastMagRef.current = mag;
        };
        const start = () => { window.addEventListener('devicemotion', handler); listenerRef.current = handler; setCounting(true); };
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission().then(s => { if (s === 'granted') start(); else alert('Permission denied.'); });
        } else start();
      };

      const stopCounter = () => {
        if (listenerRef.current) { window.removeEventListener('devicemotion', listenerRef.current); listenerRef.current = null; }
        setCounting(false);
        const total = todaySteps + liveSteps;
        setStepInput(String(total));
        saveSteps(total);
        setLiveSteps(0);
      };

      return (
        <div className="tab-content safe-bottom">
          <div className="px-4 pt-4 pb-1" />

          {/* ── GYM ── */}
          {innerTab === 'gym' && (
            <div className="px-4 space-y-4">
              {/* This week card */}
              <div className="rounded-2xl p-4" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
                <div className="flex justify-between items-start mb-4">
                  <div>
                    <p className="font-bold text-lg">This Week</p>
                    <p className="text-sm" style={{ color: '#6b7280' }}>Goal: at least 1 session</p>
                  </div>
                  <div className="text-right">
                    <p className="text-xl font-bold" style={{ color: wentThisWeek ? '#10b981' : '#ef4444' }}>
                      {wentThisWeek ? '✅ Done!' : 'Not yet'}
                    </p>
                    {gymWeekStreak > 0 && (
                      <p className="text-xs font-bold mt-0.5" style={{ color: '#fb923c' }}>🔥 {gymWeekStreak} wk streak</p>
                    )}
                  </div>
                </div>
                <div className="grid grid-cols-7 gap-1.5">
                  {thisWeekDays.map((ds, i) => {
                    const went = wentGym(ds);
                    const isT = ds === today;
                    const isPast = ds <= today;
                    return (
                      <button key={ds} onClick={() => isPast && toggleGym(ds)} disabled={!isPast}
                        className="flex flex-col items-center py-2.5 rounded-xl transition-all"
                        style={{ background: went ? '#052e16' : isT ? '#1a2e1a' : '#2c2c2e', border: `1px solid ${went ? '#059669' : isT ? '#14532d' : '#3a3a3c'}`, opacity: !isPast ? 0.3 : 1 }}>
                        <span className="text-xs font-bold" style={{ color: went ? '#6ee7b7' : '#6b7280' }}>{DAY_LABELS[i]}</span>
                        <span className="text-sm mt-0.5">{went ? '💪' : isT ? '⏳' : '—'}</span>
                      </button>
                    );
                  })}
                </div>
                {!wentThisWeek && (
                  <button onClick={() => toggleGym(today)}
                    className="mt-4 w-full py-3 rounded-2xl font-bold text-sm"
                    style={{ background: '#059669', color: '#fff' }}>
                    💪 Log Gym Today
                  </button>
                )}
              </div>

              {/* 8-week history */}
              <div className="rounded-2xl p-4" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
                <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>LAST 8 WEEKS</p>
                <div className="space-y-2">
                  {last8Weeks.map(({ mon, days, hit }) => {
                    const isThisWeek = mon === thisWeekMon;
                    return (
                      <div key={mon} className="flex items-center gap-2">
                        <span className="text-xs w-14 flex-shrink-0" style={{ color: '#6b7280' }}>
                          {isThisWeek ? 'This wk' : new Date(mon + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                        </span>
                        <div className="flex gap-1 flex-1">
                          {days.map(ds => (
                            <div key={ds} className="flex-1 h-5 rounded"
                              style={{ background: wentGym(ds) ? '#059669' : ds > today ? '#1c1c1e' : '#2c2c2e' }} />
                          ))}
                        </div>
                        <span className="text-sm w-4 text-center font-bold" style={{ color: hit ? '#10b981' : mon < thisWeekMon ? '#ef4444' : '#4b5563' }}>
                          {hit ? '✓' : mon < thisWeekMon ? '✗' : '–'}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* ── STEPS ── */}
          {innerTab === 'steps' && (
            <div className="px-4 space-y-4">
              {/* Progress ring */}
              <div className="rounded-2xl p-5" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
                <p className="font-bold text-lg mb-4">Today's Steps</p>
                <div className="flex items-center justify-center mb-4">
                  <div className="relative" style={{ width: 140, height: 140 }}>
                    <svg viewBox="0 0 120 120" style={{ width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
                      <circle cx="60" cy="60" r="50" fill="none" stroke="#2c2c2e" strokeWidth="10"/>
                      <circle cx="60" cy="60" r="50" fill="none" stroke={stepPct >= 100 ? '#10b981' : '#6366f1'} strokeWidth="10"
                        strokeDasharray={`${2 * Math.PI * 50}`}
                        strokeDashoffset={`${2 * Math.PI * 50 * (1 - stepPct / 100)}`}
                        strokeLinecap="round" style={{ transition: 'stroke-dashoffset 0.5s' }}/>
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                      <span className="text-2xl font-bold" style={{ color: stepPct >= 100 ? '#10b981' : '#818cf8' }}>
                        {(todaySteps + (counting ? liveSteps : 0)).toLocaleString()}
                      </span>
                      <span className="text-xs" style={{ color: '#6b7280' }}>/ {STEP_GOAL.toLocaleString()}</span>
                      <span className="text-xs font-bold" style={{ color: stepPct >= 100 ? '#10b981' : '#818cf8' }}>
                        {counting ? `+${liveSteps} live` : `${stepPct}%`}
                      </span>
                    </div>
                  </div>
                </div>
                {stepPct >= 100 && <p className="text-center text-sm font-bold mb-3" style={{ color: '#10b981' }}>🎉 Goal reached!</p>}
                <div className="flex gap-2 mb-3">
                  {!counting ? (
                    <button onClick={startCounter} className="flex-1 py-2.5 rounded-2xl font-bold text-sm" style={{ background: '#4f46e5', color: '#fff' }}>
                      📱 Start Live Counter
                    </button>
                  ) : (
                    <button onClick={stopCounter} className="flex-1 py-2.5 rounded-2xl font-bold text-sm" style={{ background: '#ef4444', color: '#fff' }}>
                      ⏹ Stop & Save ({liveSteps} steps)
                    </button>
                  )}
                </div>
                <div className="flex gap-2">
                  <input type="number" value={stepInput} onChange={e => setStepInput(e.target.value)}
                    placeholder="Enter steps manually"
                    className="flex-1 px-3 py-2.5 rounded-xl text-sm"
                    style={{ background: '#2c2c2e', color: '#fff', border: '1px solid #3a3a3c' }} />
                  <button onClick={() => saveSteps(stepInput)}
                    className="px-4 py-2.5 rounded-xl font-bold text-sm" style={{ background: '#059669', color: '#fff' }}>
                    Save
                  </button>
                </div>
              </div>

              {/* 14-day bar chart */}
              <div className="rounded-2xl p-4" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
                <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>LAST 14 DAYS</p>
                <div className="flex items-end gap-1" style={{ height: 80 }}>
                  {last14.map(({ ds, steps }) => {
                    const pct = maxSteps > 0 ? (steps / maxSteps) * 100 : 0;
                    const isT = ds === today;
                    return (
                      <div key={ds} className="flex-1 flex flex-col items-center gap-1 h-full justify-end">
                        <div className="w-full rounded-t transition-all"
                          style={{ height: `${Math.max(4, pct)}%`, background: steps >= STEP_GOAL ? '#10b981' : '#6366f1', outline: isT ? '1.5px solid #fff' : 'none' }}
                          title={`${ds}: ${steps.toLocaleString()}`} />
                        <span style={{ fontSize: 9, color: '#4b5563' }}>{new Date(ds + 'T12:00:00').getDate()}</span>
                      </div>
                    );
                  })}
                </div>
                <div className="flex gap-3 mt-2">
                  <span className="flex items-center gap-1 text-xs" style={{ color: '#6b7280' }}><span style={{ width:8,height:8,borderRadius:2,background:'#10b981',display:'inline-block'}}/>10k+ steps</span>
                  <span className="flex items-center gap-1 text-xs" style={{ color: '#6b7280' }}><span style={{ width:8,height:8,borderRadius:2,background:'#6366f1',display:'inline-block'}}/>Below goal</span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Prayers + Wellness wrapper ───────────────────────────────────
    function PrayersWellnessTab({ user, allUsers }) {
      const [sub, setSub] = useState('prayers');
      const subTabs = [
        { id: 'prayers', icon: '🕌', label: 'Prayers' },
        { id: 'gym',     icon: '💪', label: 'Gym'     },
        { id: 'steps',   icon: '👟', label: 'Steps'   },
      ];
      return (
        <div style={{ background: '#0f0f0f', minHeight: '100vh' }}>
          {/* Sub-tab bar */}
          <div className="fixed top-0 left-0 right-0 z-30 px-4"
            style={{ paddingTop: 'max(14px, env(safe-area-inset-top))', background: 'rgba(15,15,15,0.95)', backdropFilter: 'blur(20px)', borderBottom: '1px solid #1c1c1e', paddingBottom: 10 }}>
            <div className="flex gap-2">
              {subTabs.map(t => (
                <button key={t.id} onClick={() => setSub(t.id)}
                  className="flex-1 py-2 rounded-xl text-sm font-semibold transition-all"
                  style={{ background: sub === t.id ? '#10b981' : '#1c1c1e', color: sub === t.id ? '#fff' : '#6b7280' }}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ paddingTop: 70 }}>
            {sub === 'prayers' && <PrayersTab user={user} allUsers={allUsers} noPadTop />}
            {sub !== 'prayers' && <WellnessTab user={user} initialTab={sub} />}
          </div>
        </div>
      );
    }

    // ─── Tasks + Shopping wrapper ──────────────────────────────────────
    function TasksShoppingTab({ user, allUsers }) {
      const [sub, setSub] = useState('tasks');
      return (
        <div style={{ background: '#0f0f0f', minHeight: '100vh' }}>
          {/* Sub-tab bar */}
          <div className="fixed top-0 left-0 right-0 z-30 px-4"
            style={{ paddingTop: 'max(14px, env(safe-area-inset-top))', background: 'rgba(15,15,15,0.95)', backdropFilter: 'blur(20px)', borderBottom: '1px solid #1c1c1e', paddingBottom: 10 }}>
            <div className="flex gap-2">
              {[{ id:'tasks', icon:'✅', label:'Tasks' }, { id:'shopping', icon:'🛒', label:'Shopping' }].map(t => (
                <button key={t.id} onClick={() => setSub(t.id)}
                  className="flex-1 py-2 rounded-xl text-sm font-semibold transition-all"
                  style={{ background: sub === t.id ? '#10b981' : '#1c1c1e', color: sub === t.id ? '#fff' : '#6b7280' }}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ paddingTop: 70 }}>
            {sub === 'tasks'    && <TasksTab    user={user} allUsers={allUsers} noPadTop />}
            {sub === 'shopping' && <ShoppingTab user={user} allUsers={allUsers} noPadTop />}
          </div>
        </div>
      );
    }

    // ─── Bottom Nav ───────────────────────────────────────────────────
    function BottomNav({ active, onChange }) {
      const tabs = [
        { id: 'home',    icon: '🏠', label: 'Home'    },
        { id: 'prayers', icon: '🕌', label: 'Prayers' },
        { id: 'bills',   icon: '💳', label: 'Bills'   },
        { id: 'tasks',   icon: '✅', label: 'Tasks'   },
      ];

      return (
        <nav
          className="fixed bottom-0 left-0 right-0 z-40"
          style={{
            background: 'rgba(15,15,15,0.96)',
            backdropFilter: 'blur(20px)',
            borderTop: '1px solid #1c1c1e',
            paddingBottom: 'env(safe-area-inset-bottom)',
          }}
        >
          <div className="flex items-stretch">
            {tabs.map(tab => {
              const isActive = active === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => onChange(tab.id)}
                  className="flex-1 flex flex-col items-center justify-center gap-1 py-3 relative transition-all"
                  style={{ WebkitTapHighlightColor: 'transparent' }}
                >
                  {isActive && (
                    <div className="absolute top-1.5 left-1/2 -translate-x-1/2 h-1 rounded-full"
                      style={{ background: '#10b981', width: 28 }} />
                  )}
                  <span className="text-2xl leading-none" style={{ filter: isActive ? 'none' : 'grayscale(1) opacity(0.4)' }}>
                    {tab.icon}
                  </span>
                  <span className="text-xs font-semibold leading-none"
                    style={{ color: isActive ? '#10b981' : '#4b5563' }}>
                    {tab.label}
                  </span>
                </button>
              );
            })}
          </div>
        </nav>
      );
    }

    // ─── App Root ─────────────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(null);
      const [allUsers, setAllUsers] = useState([]);
      const [tab, setTab] = useState('home');

      useEffect(() => {
        if (user) {
          db.from('family_users').select('*').then(({ data }) => setAllUsers(data || []));
          // Auto-schedule prayer notifications on login if previously enabled
          if (localStorage.getItem('salahNotif') === 'true' && Notification.permission === 'granted') {
            schedulePrayerAlerts(getPrayerTimes(new Date())).catch(() => {});
          }
        }
      }, [user?.id]);

      const logout = () => { setUser(null); setTab('home'); };

      if (!user) return <LoginScreen onLogin={u => setUser(u)} />;

      return (
        <div style={{ background: '#0f0f0f', minHeight: '100vh' }}>
          {/* User avatar / logout */}
          <div className="fixed top-0 right-0 z-50 px-4 pt-safe-top" style={{ paddingTop: 'max(16px, env(safe-area-inset-top))' }}>
            <button
              onClick={logout}
              className="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold shadow-lg"
              style={{ background: '#10b981', color: '#fff' }}
              title={`${user.name} — tap to log out`}
            >
              {user.name[0]}
            </button>
          </div>

          {/* Tabs */}
          {tab === 'home'    && <HomeTab    user={user} switchTab={setTab} />}
          {tab === 'prayers' && <PrayersWellnessTab user={user} allUsers={allUsers} />}
          {tab === 'bills'   && <BillsTab   user={user} />}
          {tab === 'tasks'   && <TasksShoppingTab user={user} allUsers={allUsers} />}

          <BottomNav active={tab} onChange={setTab} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
