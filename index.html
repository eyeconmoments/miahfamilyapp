    function getPrayerTimes(date) {
      const year = date.getFullYear();
      const jan1 = new Date(year, 0, 1);
      const targetDay = Math.round((new Date(year, date.getMonth(), date.getDate()) - jan1) / 86400000);

      const days = ANCHORS.map(([month, day, times]) => ({
        day: Math.round((new Date(year, month - 1, day) - jan1) / 86400000),
        times,
      }));

      let before = days[0];
      let after = days[days.length - 1];
      for (const a of days) { if (a.day <= targetDay) before = a; }
      for (const a of [...days].reverse()) { if (a.day >= targetDay) { after = a; break; } }

      const t = before.day === after.day ? 0 : (targetDay - before.day) / (after.day - before.day);
      const interp = before.times.map((bv, i) => Math.round(bv + t * (after.times[i] - bv)));
      const fmt = m => `${Math.floor(m / 60)}:${(m % 60).toString().padStart(2, '0')}`;
      return {
        fajr: fmt(interp[0]),
        dhuhr: fmt(interp[1]),
        asr: fmt(interp[2]),
        maghrib: fmt(interp[3]),
        isha: fmt(interp[4]),
      };
    }

    // ─── Utilities ───────────────────────────────────────────────────
    const ordinal = n => {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return `${n}${s[(v - 20) % 10] || s[v] || s[0]}`;
    };

    const fmtGBP = n => `£${parseFloat(n || 0).toFixed(2)}`;

    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    const monthYearStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    };

    const PRAYER_KEYS = ['fajr', 'dhuhr', 'asr', 'maghrib', 'isha'];
    const PRAYER_LABELS = { fajr: 'Fajr', dhuhr: 'Dhuhr', asr: 'Asr', maghrib: 'Maghrib', isha: 'Isha' };
    const PRAYER_ICONS = { fajr: '🌙', dhuhr: '☀️', asr: '🌤️', maghrib: '🌅', isha: '🌃' };

    const CATEGORIES = ['bill', 'direct debit', 'utility', 'subscription', 'insurance', 'mortgage', 'other'];
    const CAT_STYLE = {
      'bill':          { bg: '#052e16', text: '#6ee7b7', border: '#064e3b' },
      'direct debit':  { bg: '#1e3a5f', text: '#93c5fd', border: '#1d4ed8' },
      'utility':       { bg: '#3b2f00', text: '#fcd34d', border: '#b45309' },
      'subscription':  { bg: '#2e1065', text: '#c4b5fd', border: '#6d28d9' },
      'insurance':     { bg: '#431407', text: '#fca5a1', border: '#dc2626' },
      'mortgage':      { bg: '#450a0a', text: '#fca5a1', border: '#b91c1c' },
      'other':         { bg: '#1a1a1a', text: '#9ca3af', border: '#374151' },
    };

    const SAMPLE_BILLS = [
      { name: 'Mortgage',       amount: 1200.00, due_day: 1,  category: 'mortgage'      },
      { name: 'Council Tax',    amount: 185.00,  due_day: 5,  category: 'bill'          },
      { name: 'Virgin Media',   amount: 65.00,   due_day: 8,  category: 'direct debit'  },
      { name: 'British Gas',    amount: 115.00,  due_day: 12, category: 'utility'       },
      { name: 'Car Insurance',  amount: 89.99,   due_day: 15, category: 'insurance'     },
      { name: 'Water Bill',     amount: 42.00,   due_day: 22, category: 'utility'       },
      { name: 'Netflix',        amount: 10.99,   due_day: 25, category: 'subscription'  },
    ];

    // ─── Prayer notification scheduling (via Service Worker) ────────
    const schedulePrayerAlerts = async (times) => {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      if (!('serviceWorker' in navigator)) return;
      const now = new Date();
      const nowMs = now.getHours() * 3600000 + now.getMinutes() * 60000 + now.getSeconds() * 1000;
      const prayers = PRAYER_KEYS.map(key => {
        const [h, m] = times[key].split(':').map(Number);
        return { key, label: PRAYER_LABELS[key], icon: PRAYER_ICONS[key], time: times[key], delayMs: (h * 3600000 + m * 60000) - nowMs };
      }).filter(p => p.delayMs > 90000);
      if (!prayers.length) return;
      try {
        const reg = await navigator.serviceWorker.ready;
        if (reg.active) reg.active.postMessage({ type: 'PRAYER_SCHEDULE', prayers });
      } catch(e) {}
    };

    // Register service worker on load
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // ─── Modal ───────────────────────────────────────────────────────
    function Modal({ title, onClose, children }) {

    // ─── Login Screen ─────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [users, setUsers] = useState([]);
      const [selected, setSelected] = useState(null);
      const [pin, setPin] = useState('');
      const [error, setError] = useState('');
      const [shaking, setShaking] = useState(false);

      useEffect(() => {
        db.from('family_users').select('*').order('name').then(({ data }) => setUsers(data || []));
      }, []);

      const handleDigit = d => {
        if (pin.length >= 4) return;
        const next = pin + d;
        setPin(next);
        setError('');
        if (next.length === 4) {
          setTimeout(() => {
            if (next === selected.pin) {
              onLogin(selected);
            } else {
              setShaking(true);
              setTimeout(() => { setShaking(false); setPin(''); setError('Wrong PIN — try again'); }, 500);
            }
          }, 100);
        }
      };

      const handleBack = () => { setPin(p => p.slice(0, -1)); setError(''); };

      const PadBtn = ({ label, onClick, sub }) => (
        <button
          onClick={onClick}
          className="flex flex-col items-center justify-center rounded-full transition-all active:scale-90"
          style={{ background: '#1c1c1e', width: 78, height: 78, border: '1px solid #2c2c2e' }}
        >

      return (

                  {u.name}
                </button>
              ))}
            </div>
          ) : (
            <div className="w-full max-w-xs flex flex-col items-center">
              <button
                onClick={() => { setSelected(null); setPin(''); setError(''); }}
                className="self-start mb-6 text-sm flex items-center gap-1"
                style={{ color: '#10b981' }}
              >
                ← Back
              </button>
              <p className="text-lg font-semibold mb-1">Hi, {selected.name}!</p>

              {/* Dots */}
              <div className={`flex gap-5 mb-3 transition-all ${shaking ? 'animate-bounce' : ''}`}>
                {[0,1,2,3].map(i => (
                  <div
                    key={i}
                    className="w-4 h-4 rounded-full transition-all duration-150"
                    style={{ background: i < pin.length ? '#10b981' : 'transparent', border: '2px solid', borderColor: i < pin.length ? '#10b981' : '#4b5563' }}

              </div>
              {error && <p className="text-sm mb-4" style={{ color: '#ef4444' }}>{error}</p>}
              {!error && <div className="mb-4 h-5" />}

              {/* Numpad */}

    // ─── Home Tab ─────────────────────────────────────────────────────
    function HomeTab({ user, switchTab }) {
      const [now, setNow] = useState(new Date());
      const [prayerLogs, setPrayerLogs] = useState([]);
      const [bills, setBills] = useState([]);
      const [payments, setPayments] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [shopping, setShopping] = useState([]);
      const [gymLogs, setGymLogs] = useState([]);

      useEffect(() => {
        const iv = setInterval(() => setNow(new Date()), 30000);
        return () => clearInterval(iv);
      }, []);

      useEffect(() => {
        const t = todayStr(), my = monthYearStr();
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
        const cutoffStr = cutoff.toISOString().slice(0, 10);
        Promise.all([
          db.from('prayer_log').select('*').eq('user_id', user.id).eq('prayer_date', t),
          db.from('bills').select('*').eq('is_active', true),
          db.from('bill_payments').select('*').eq('month_year', my),
          db.from('family_tasks').select('*').eq('completed', false),
          db.from('shopping_items').select('*').eq('completed', false),
          db.from('family_gym_logs').select('*').eq('user_id', user.id).gte('date', cutoffStr),
        ]).then(([pl, bl, bp, tk, sh, gl]) => {
          setPrayerLogs(pl.data || []);
          setBills(bl.data || []);
          setPayments(bp.data || []);
          setTasks(tk.data || []);
          setShopping(sh.data || []);
          setGymLogs(gl.data || []);
        });
      }, [user.id]);

      const prayerTimes = useMemo(() => getPrayerTimes(now), [now.toDateString()]);
      const donePrayers = prayerLogs.length;
      const todayScore = prayerLogs.reduce((s, l) => s + (l.status === 'kazaa' ? 0.5 : 1), 0);

      const greeting = () => {
        const h = now.getHours();
        if (h < 5)  return 'Assalamu Alaikum \u{1F319}';
        if (h < 12) return 'Good morning \u{2600}\uFE0F';
        if (h < 17) return 'Good afternoon 🌤️';
        if (h < 20) return 'Good evening \u{1F305}';
        return 'Good night \u{1F303}';
      };

      const nextPrayer = useMemo(() => {
        const nowMins = now.getHours() * 60 + now.getMinutes();
        for (const key of PRAYER_KEYS) {
          const [h, m] = prayerTimes[key].split(':').map(Number);
          const pMins = h * 60 + m;
          if (pMins > nowMins) {
            const diff = pMins - nowMins;
            const hrs = Math.floor(diff / 60), mins = diff % 60;
            return {
              name: PRAYER_LABELS[key],
              icon: PRAYER_ICONS[key],
              time: prayerTimes[key],
              in: hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`,
            };
          }
        }
        return { name: 'Fajr', icon: '\u{1F319}', time: prayerTimes.fajr, in: 'Tomorrow' };
      }, [now, prayerTimes]);

      const paidIds = new Set(payments.map(p => p.bill_id));
      const day = now.getDate();
      const dueSoon = bills.filter(b => b.due_day >= day && b.due_day <= day + 7 && !paidIds.has(b.id));
      const myTasks = tasks.filter(t => !t.assigned_to || t.assigned_to === user.id).slice(0, 3);
      const totalBills = bills.reduce((s, b) => s + parseFloat(b.amount || 0), 0);
      const paidAmt = payments.reduce((s, p) => s + parseFloat(p.amount_paid || 0), 0);
      const remaining = totalBills - paidAmt;

      // Gym this week
      const getMon = ds => {
        const d = new Date(ds + 'T12:00:00');
        const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
        d.setDate(d.getDate() + diff);
        return d.toISOString().slice(0, 10);
      };
      const thisWeekMon = getMon(todayStr());
      const thisWeekDays = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(thisWeekMon + 'T12:00:00'); d.setDate(d.getDate() + i);
        return d.toISOString().slice(0, 10);
      });
      const wentGymThisWeek = thisWeekDays.some(ds => gymLogs.some(r => r.date === ds));

      // SVG prayer ring constants
      const R = 46;
      const CIRC = 2 * Math.PI * R;

      return (
        <div className="tab-content safe-bottom">
          {/* Hero section with circular prayer ring */}
          <div style={{ background: 'linear-gradient(170deg, #061510 0%, #0b1c12 45%, #0f0f0f 100%)' }} className="px-4 pt-16 pb-6">
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="text-sm font-medium" style={{ color: '#6ee7b7' }}>{greeting()}</p>
                <h1 className="text-3xl font-bold mt-0.5 tracking-tight">{user.name}</h1>
                <p className="text-xs mt-1" style={{ color: '#4b5563' }}>
                  {now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}
                </p>
              </div>
              {donePrayers === 5 && <span className="text-4xl mt-1">⭐</span>}
            </div>

            {/* Ring + next prayer info */}
            <div className="flex items-center gap-5">
              <div className="relative flex-shrink-0" style={{ width: 116, height: 116 }}>
                <svg viewBox="0 0 116 116" style={{ width: '100%', height: '100%', transform: 'rotate(-90deg)' }}>
                  <circle cx="58" cy="58" r={R} fill="none" stroke="#102018" strokeWidth="12"/>
                  <circle cx="58" cy="58" r={R} fill="none"
                    stroke={donePrayers === 5 ? '#10b981' : '#059669'}
                    strokeWidth="12"
                    strokeDasharray={CIRC}
                    strokeDashoffset={CIRC - (donePrayers / 5) * CIRC}
                    strokeLinecap="round"
                    style={{ transition: 'stroke-dashoffset 0.6s ease' }}
                  />
                </svg>
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="font-bold leading-none" style={{ fontSize: 28, color: '#10b981' }}>{donePrayers}</span>
                  <span className="text-xs leading-none mt-1" style={{ color: '#4b5563' }}>of 5</span>
                  {todayScore > 0 && (
                    <span className="font-bold mt-1" style={{ fontSize: 11, color: '#6ee7b7' }}>{todayScore}pts</span>
                  )}
                </div>
              </div>

              <div className="flex-1 min-w-0">
                <p className="text-xs font-semibold mb-2" style={{ color: '#374151', letterSpacing: 1 }}>NEXT PRAYER</p>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-2xl">{nextPrayer.icon}</span>
                  <div>
                    <p className="text-xl font-bold leading-tight">{nextPrayer.name}</p>
                    <p className="text-sm font-medium" style={{ color: '#10b981' }}>{nextPrayer.time}</p>
                  </div>
                </div>
                <div className="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-bold"
                  style={{ background: '#102018', color: '#6ee7b7' }}>
                  ⏱ in {nextPrayer.in}
                </div>
              </div>
            </div>

            {/* Prayer strip indicators */}
            <div className="flex gap-2 mt-5">
              {PRAYER_KEYS.map(k => {
                const log = prayerLogs.find(l => l.prayer_name === k);
                const isKazaa = log?.status === 'kazaa';
                const isOnTime = log && !isKazaa;
                return (
                  <div key={k} className="flex-1 flex flex-col items-center gap-1">
                    <div className="w-full rounded-full" style={{ height: 4, background: isOnTime ? '#10b981' : isKazaa ? '#f59e0b' : '#1a2e22' }} />
                    <span style={{ fontSize: 9, color: isOnTime ? '#6ee7b7' : isKazaa ? '#fbbf24' : '#374151' }}>
                      {PRAYER_LABELS[k].slice(0, 3)}
                    </span>
                  </div>
                );
              })}
            </div>

            {/* Prayers missed/overdue today */}
            {donePrayers < 5 && (() => {
              const nowMins = now.getHours() * 60 + now.getMinutes();
              const pastMissed = PRAYER_KEYS.filter(k => {
                if (prayerLogs.some(l => l.prayer_name === k)) return false;
                const [h, m] = prayerTimes[k].split(':').map(Number);
                return (h * 60 + m) <= nowMins;
              });
              if (pastMissed.length === 0) return null;
              return (
                <button onClick={() => switchTab('prayers')}
                  className="mt-3 w-full text-left flex items-center gap-2 px-3 py-2 rounded-xl active:opacity-80"
                  style={{ background: 'rgba(239,68,68,0.12)', border: '1px solid rgba(239,68,68,0.25)' }}>
                  <span className="text-sm">⚠️</span>
                  <p className="text-xs font-medium flex-1" style={{ color: '#fca5a5' }}>
                    Missed: {pastMissed.map(k => PRAYER_LABELS[k]).join(' · ')}
                  </p>
                  <span className="text-xs" style={{ color: '#f87171' }}>Log now →</span>
                </button>
              );
            })()}
          </div>

          {/* Dashboard cards */}
          <div className="px-4 pt-3 space-y-3">
            {/* Bills card */}
            <button
              onClick={() => switchTab('bills')}
              className="w-full rounded-2xl p-4 text-left active:opacity-80 transition-opacity"
              style={{ background: '#1c1c1e' }}
            >
              <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>BILLS THIS MONTH</p>
              <div className="flex items-end justify-between mb-3">
                <div>
                  <p className="text-3xl font-bold">{fmtGBP(totalBills)}</p>
                  <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>total going out</p>
                </div>
                <div className="text-right space-y-0.5">
                  <p className="text-lg font-bold" style={{ color: '#10b981' }}>{fmtGBP(paidAmt)} <span className="text-xs font-normal" style={{ color: '#6b7280' }}>paid</span></p>
                  <p className="text-lg font-bold" style={{ color: remaining > 0 ? '#f59e0b' : '#4b5563' }}>{fmtGBP(remaining)} <span className="text-xs font-normal" style={{ color: '#6b7280' }}>left</span></p>
                </div>
              </div>
              <div className="h-2 rounded-full mb-2" style={{ background: '#2c2c2e' }}>
                <div className="h-2 rounded-full transition-all duration-500"
                  style={{ background: '#10b981', width: totalBills > 0 ? `${Math.min((paidAmt / totalBills) * 100, 100)}%` : '0%' }} />
              </div>
              <div className="flex items-center justify-between">
                <p className="text-xs" style={{ color: '#4b5563' }}>{paidIds.size}/{bills.length} bills paid</p>
                {dueSoon.length > 0 && (
                  <p className="text-xs" style={{ color: '#f59e0b' }}>⚠️ {dueSoon.length} due soon</p>
                )}
              </div>
            </button>

            {/* Stat cards row */}
            <div className="grid grid-cols-3 gap-2.5">
              <button onClick={() => switchTab('tasks')} className="rounded-2xl p-4 text-left active:opacity-80" style={{ background: '#1c1c1e' }}>
                <p className="text-2xl mb-2">✅</p>
                <p className="text-2xl font-bold">{tasks.length}</p>
                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>tasks</p>
              </button>
              <button onClick={() => switchTab('tasks')} className="rounded-2xl p-4 text-left active:opacity-80" style={{ background: '#1c1c1e' }}>
                <p className="text-2xl mb-2">🛒</p>
                <p className="text-2xl font-bold">{shopping.length}</p>
                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>shopping</p>
              </button>
              <button
                onClick={() => switchTab('prayers')}
                className="rounded-2xl p-4 text-left active:opacity-80 transition-all"
                style={{ background: wentGymThisWeek ? '#052e16' : '#1c1c1e', border: `1px solid ${wentGymThisWeek ? '#059669' : 'transparent'}` }}
              >
                <p className="text-2xl mb-2">💪</p>
                <p className="text-2xl font-bold" style={{ color: wentGymThisWeek ? '#10b981' : '#fff' }}>
                  {wentGymThisWeek ? '\u2713' : '\u2014'}
                </p>
                <p className="text-xs mt-0.5" style={{ color: wentGymThisWeek ? '#6ee7b7' : '#6b7280' }}>
                  {wentGymThisWeek ? 'done!' : 'gym'}
                </p>
              </button>
            </div>

            {/* Tasks preview */}
            {myTasks.length > 0 && (
              <button
                onClick={() => switchTab('tasks')}
                className="w-full rounded-2xl p-4 text-left active:opacity-80"
                style={{ background: '#1c1c1e' }}
              >
                <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>YOUR TASKS</p>
                <div className="space-y-2.5">
                  {myTasks.map(t => {
                    const isOverdue = t.due_date && t.due_date < todayStr();
                    return (
                      <div key={t.id} className="flex items-center gap-2.5">
                        <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: isOverdue ? '#ef4444' : '#10b981' }} />
                        <p className="text-sm flex-1 truncate">{t.title}</p>
                        {t.due_date && (
                          <span className="text-xs flex-shrink-0" style={{ color: isOverdue ? '#ef4444' : '#4b5563' }}>
                            {isOverdue ? 'overdue' : new Date(t.due_date + 'T12:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
                {tasks.length > 3 && (
                  <p className="text-xs mt-3" style={{ color: '#4b5563' }}>+{tasks.length - 3} more →</p>
                )}
              </button>
            )}
          </div>
        </div>
      );
    }
    // ─── Prayers Tab ──────────────────────────────────────────────────
    function PrayersTab({ user, allUsers, noPadTop }) {
      const [date, setDate] = useState(todayStr());
      const [logs, setLogs] = useState([]);
      const [busy, setBusy] = useState({});
      const [historyLogs, setHistoryLogs] = useState([]); // last 30 days for streak
      const [allTodayLogs, setAllTodayLogs] = useState([]); // all users today
      const [notifOn, setNotifOn] = useState(() => localStorage.getItem('salahNotif') === 'true' && Notification.permission === 'granted');

      const prayerTimes = useMemo(() => getPrayerTimes(new Date(date + 'T12:00:00')), [date]);

      const fetchLogs = () => {
        db.from('prayer_log').select('*').eq('user_id', user.id).eq('prayer_date', date)
          .then(({ data }) => setLogs(data || []));
      };

      useEffect(() => { fetchLogs(); }, [date, user.id]);

      // Fetch history for streak + all users for comparison (only when on today)
      useEffect(() => {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 30);
        const cutoffStr = cutoff.toISOString().slice(0, 10);
        db.from('prayer_log').select('*').eq('user_id', user.id).gte('prayer_date', cutoffStr)
          .then(({ data }) => setHistoryLogs(data || []));
        db.from('prayer_log').select('*').eq('prayer_date', todayStr())
          .then(({ data }) => setAllTodayLogs(data || []));
      }, [user.id]);

      // Cycle: none → on_time → kazaa → none
      const toggle = async key => {
        if (busy[key]) return;
        setBusy(b => ({ ...b, [key]: true }));
        const existing = logs.find(l => l.prayer_name === key);
        if (!existing) {
          // not prayed → on time
          const { data } = await db.from('prayer_log')
            .insert({ user_id: user.id, prayer_name: key, prayer_date: date, status: 'on_time' })
            .select().single();
          if (data) { setLogs(prev => [...prev, data]); setAllTodayLogs(prev => [...prev, data]); }
        } else if (existing.status !== 'kazaa') {
          // on time → kazaa
          await db.from('prayer_log').update({ status: 'kazaa' }).eq('id', existing.id);
          const updated = { ...existing, status: 'kazaa' };
          setLogs(prev => prev.map(l => l.id === existing.id ? updated : l));
          setAllTodayLogs(prev => prev.map(l => l.id === existing.id ? updated : l));
        } else {
          // kazaa → remove
          await db.from('prayer_log').delete().eq('id', existing.id);
          setLogs(prev => prev.filter(l => l.id !== existing.id));
          setAllTodayLogs(prev => prev.filter(l => l.id !== existing.id));
        }
        setBusy(b => ({ ...b, [key]: false }));
      };

      const done = logs.length;
      const isToday = date === todayStr();

      // Next prayer
      const now = new Date();
      const nowMins = now.getHours() * 60 + now.getMinutes();
      const nextKey = isToday ? PRAYER_KEYS.find(k => {
        const [h, m] = prayerTimes[k].split(':').map(Number);
        return (h * 60 + m) > nowMins;
      }) : null;

      // Scoring: on_time = 1pt, kazaa = 0.5pt (max 5 per day)
      const scoreDay = ds => {
        const dayLogs = historyLogs.filter(l => l.prayer_date === ds);
        return dayLogs.reduce((s, l) => s + (l.status === 'kazaa' ? 0.5 : 1), 0);
      };
      const todayScore = logs.reduce((s, l) => s + (l.status === 'kazaa' ? 0.5 : 1), 0);

      // Streak: consecutive days ending today with all 5 prayed (any status)
      const streak = (() => {
        let s = 0;
        const d = new Date();
        for (let i = 0; i < 30; i++) {
          const ds = d.toISOString().slice(0, 10);
          const count = historyLogs.filter(l => l.prayer_date === ds).length;
          if (count === 5) { s++; d.setDate(d.getDate() - 1); }
          else break;
        }
        return s;
      })();

      // Last 14 days dot history
      const last14 = Array.from({ length: 14 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (13 - i));
        const ds = d.toISOString().slice(0, 10);
        const dayLogs = historyLogs.filter(l => l.prayer_date === ds);
        return { ds, count: dayLogs.length, score: scoreDay(ds), allOnTime: dayLogs.length === 5 && dayLogs.every(l => l.status !== 'kazaa') };
      });

      // Family comparison for today
      const familyComparison = allUsers.map(u => ({
        ...u,
        count: allTodayLogs.filter(l => l.user_id === u.id).length,
      })).sort((a, b) => b.count - a.count);

      return (
        <div className="tab-content safe-bottom">
          <div className={`px-4 pb-3 ${noPadTop ? 'pt-3' : 'pt-14'}`}>
            <div className="flex justify-between items-start">
              <div>
                <h2 className="text-2xl font-bold">Prayers</h2>
                <p className="text-sm mt-0.5" style={{ color: '#8e8e93' }}>
                  {done}/5 prayed · <span style={{ color: todayScore === 5 ? '#10b981' : todayScore >= 3 ? '#f59e0b' : '#6b7280' }}>{todayScore}/5 pts</span>
                  {' · '}{isToday ? 'Today' : new Date(date + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' })}
                </p>
              </div>
              <div className="flex items-center gap-2">
                {streak > 0 && (
                  <div className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold" style={{ background: '#431407', color: '#fb923c' }}>
                    🔥 {streak}d
                  </div>
                )}
                <button
                  onClick={async () => {
                    if (notifOn) {
                      localStorage.removeItem('salahNotif');
                      setNotifOn(false);
                    } else {
                      const perm = await Notification.requestPermission();
                      if (perm === 'granted') {
                        localStorage.setItem('salahNotif', 'true');
                        setNotifOn(true);
                        schedulePrayerAlerts(getPrayerTimes(new Date()));
                      } else {
                        alert('Notification permission denied. Enable it in your browser settings.');
                      }
                    }
                  }}
                  className="w-9 h-9 rounded-full flex items-center justify-center text-lg transition-all active:scale-90"
                  style={{ background: notifOn ? '#059669' : '#2c2c2e', border: notifOn ? '1px solid #10b981' : '1px solid #3a3a3c' }}
                  title={notifOn ? 'Prayer alerts ON – tap to disable' : 'Enable prayer alerts'}
                >
                  {notifOn ? '🔔' : '🔕'}
                </button>
                <input type="date" value={date} max={todayStr()} onChange={e => setDate(e.target.value)}
                  className="text-xs rounded-xl px-3 py-2"
                  style={{ background: '#2c2c2e', color: '#fff', border: '1px solid #3a3a3c' }} />
              </div>
            </div>
          </div>

          {/* Progress bar */}
          <div className="px-4 mb-4">
            <div className="h-2 rounded-full" style={{ background: '#2c2c2e' }}>
              <div className="h-2 rounded-full transition-all duration-500" style={{ background: '#10b981', width: `${(done / 5) * 100}%` }} />
            </div>
          </div>

          {/* Salah times strip */}
          <div className="mx-4 mb-3 rounded-2xl overflow-hidden" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
            <div className="flex">
              {PRAYER_KEYS.map(key => {
                const log = logs.find(l => l.prayer_name === key);
                const isNext = key === nextKey;
                const isDone = !!log;
                const isKazaa = log?.status === 'kazaa';
                return (
                  <div key={key} className="flex-1 flex flex-col items-center py-3 px-0.5"
                    style={{
                      background: isNext ? '#0d2318' : 'transparent',
                      borderTop: '2px solid ' + (isNext ? '#10b981' : isDone ? (isKazaa ? '#d97706' : '#059669') : 'transparent'),
                    }}>
                    <span style={{ fontSize: 13 }}>{PRAYER_ICONS[key]}</span>
                    <p className="font-semibold mt-0.5" style={{ fontSize: 10, color: isNext ? '#10b981' : isDone ? (isKazaa ? '#fbbf24' : '#6ee7b7') : '#9ca3af' }}>
                      {PRAYER_LABELS[key]}
                    </p>
                    <p style={{ fontSize: 11, fontWeight: 600, color: isNext ? '#34d399' : isDone ? (isKazaa ? '#d97706' : '#059669') : '#4b5563', marginTop: 1 }}>
                      {prayerTimes[key]}
                    </p>
                    {isNext && !isDone && (
                      <p style={{ fontSize: 8, letterSpacing: 0.5, color: '#10b981', marginTop: 2 }}>NEXT</p>
                    )}
                    {isDone && (
                      <div style={{ width: 4, height: 4, borderRadius: '50%', background: isKazaa ? '#f59e0b' : '#10b981', marginTop: 3 }} />
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Tap hint */}
          <div className="px-4 mb-2">
            <p className="text-xs" style={{ color: '#4b5563' }}>Tap once = on time · Tap again = kazaa · Tap again = remove</p>
          </div>

          {/* Catch-ups needed – past days with incomplete prayers */}
          {isToday && (() => {
            const catchUpDays = [];
            for (let i = 1; i <= 7; i++) {
              const d = new Date(); d.setDate(d.getDate() - i);
              const ds = d.toISOString().slice(0, 10);
              const dayLogs = historyLogs.filter(l => l.prayer_date === ds);
              const missing = PRAYER_KEYS.filter(k => !dayLogs.some(l => l.prayer_name === k));
              if (missing.length > 0) catchUpDays.push({ ds, missing, done: dayLogs.length });
            }
            if (catchUpDays.length === 0) return null;
            return (
              <div className="mx-4 mb-3 rounded-2xl p-4" style={{ background: '#1c1208', border: '1px solid #92400e' }}>
                <div className="flex items-center justify-between mb-3">
                  <p className="text-xs font-semibold" style={{ color: '#f59e0b', letterSpacing: 1 }}>🔄 CATCH-UPS NEEDED</p>
                  <p className="text-xs" style={{ color: '#78350f' }}>{catchUpDays.length} day{catchUpDays.length > 1 ? 's' : ''}</p>
                </div>
                <div className="space-y-2">
                  {catchUpDays.slice(0, 4).map(({ ds, missing, done }) => {
                    const label = new Date(ds + 'T12:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
                    return (
                      <button key={ds} onClick={() => setDate(ds)}
                        className="w-full flex items-center justify-between px-3 py-2.5 rounded-xl active:opacity-80"
                        style={{ background: '#2a1600' }}>
                        <div className="text-left">
                          <p className="text-sm font-semibold">{label}</p>
                          <p className="text-xs mt-0.5" style={{ color: '#fbbf24' }}>
                            {missing.map(k => PRAYER_LABELS[k]).join(' · ')}
                          </p>
                        </div>
                        <div className="text-right flex-shrink-0 ml-3">
                          <p className="text-sm font-bold" style={{ color: done > 0 ? '#f59e0b' : '#6b7280' }}>{done}/5</p>
                          <p className="text-xs" style={{ color: '#92400e' }}>log →</p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Prayer buttons */}
          <div className="px-4 space-y-2.5">
            {PRAYER_KEYS.map(key => {
              const log = logs.find(l => l.prayer_name === key);
              const isKazaa = log?.status === 'kazaa';
              const isOnTime = log && !isKazaa;
              const isNext = key === nextKey;
              const isBusy = busy[key];

              const bgColor = isOnTime ? '#052e16' : isKazaa ? '#2d1a00' : isNext ? '#1a2e1a' : '#1c1c1e';
              const borderColor = isOnTime ? '#059669' : isKazaa ? '#d97706' : isNext ? '#14532d' : '#2c2c2e';
              const iconBg = isOnTime ? '#059669' : isKazaa ? '#d97706' : '#2c2c2e';
              const iconLabel = isOnTime ? '✓' : isKazaa ? '⏰' : PRAYER_ICONS[key];

              return (
                <button key={key} onClick={() => toggle(key)} disabled={isBusy}
                  className="w-full rounded-2xl px-4 py-4 flex items-center gap-4 text-left transition-all active:scale-98"
                  style={{ background: bgColor, border: `1px solid ${borderColor}` }}>
                  <div className="w-12 h-12 rounded-full flex items-center justify-center text-xl flex-shrink-0 transition-all"
                    style={{ background: iconBg }}>
                    {iconLabel}
                  </div>
                  <div className="flex-1">
                    <p className="font-semibold">{PRAYER_LABELS[key]}</p>
                    <p className="text-sm" style={{ color: isOnTime ? '#6ee7b7' : isKazaa ? '#fbbf24' : '#6b7280' }}>
                      {prayerTimes[key]}
                      {isNext && !log && <span style={{ color: '#10b981' }}> · up next</span>}
                    </p>
                  </div>
                  {isOnTime && <span className="text-sm font-semibold" style={{ color: '#10b981' }}>On time ✓</span>}
                  {isKazaa && <span className="text-sm font-semibold" style={{ color: '#f59e0b' }}>Kazaa ½pt</span>}
                  {!log && <div className="w-6 h-6 rounded-full border-2" style={{ borderColor: '#4b5563' }} />}
                </button>
              );
            })}
          </div>

          {done === 5 && (
            <div className="mx-4 mt-5 rounded-2xl p-5 text-center" style={{ background: '#052e16', border: '1px solid #059669' }}>
              <p className="text-3xl mb-2">{todayScore === 5 ? '🌟' : '✅'}</p>
              <p className="font-bold text-lg" style={{ color: '#6ee7b7' }}>All 5 prayers done!</p>
              <p className="text-sm mt-1" style={{ color: '#059669' }}>
                {todayScore === 5 ? 'Alhamdulillah — all on time! 🌟' : `Score: ${todayScore}/5 pts — keep improving!`}
              </p>
              {streak >= 3 && <p className="text-xs mt-2" style={{ color: '#fb923c' }}>🔥 {streak}-day streak! Keep it going!</p>}
            </div>
          )}

          {/* 14-day history */}
          <div className="mx-4 mt-5 rounded-2xl p-4" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
            <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>LAST 14 DAYS</p>
            <div className="flex gap-1">
              {last14.map(({ ds, count, score, allOnTime }) => {
                const bg = allOnTime ? '#059669' : count === 5 ? '#d97706' : count >= 3 ? '#b45309' : count > 0 ? '#dc2626' : '#2c2c2e';
                const isT = ds === todayStr();
                return (
                  <div key={ds} className="flex-1 flex flex-col items-center gap-1">
                    <div className="w-full rounded" style={{ height: 28, background: bg, outline: isT ? '2px solid #fff' : 'none' }}
                      title={`${ds}: ${count}/5 prayers, ${score}pts`} />
                    <span style={{ fontSize: 9, color: '#4b5563' }}>{new Date(ds + 'T12:00:00').getDate()}</span>
                  </div>
                );
              })}
            </div>
            <div className="flex gap-3 mt-2 flex-wrap">
              {[{c:'#059669',l:'5 on time'},{c:'#d97706',l:'5 w/ kazaa'},{c:'#b45309',l:'3-4'},{c:'#dc2626',l:'1-2'},{c:'#2c2c2e',l:'None'}].map(({c,l}) => (
                <span key={l} className="flex items-center gap-1 text-xs" style={{ color: '#6b7280' }}>
                  <span style={{ width:8, height:8, borderRadius:2, background:c, display:'inline-block' }}/>{l}
                </span>
              ))}
            </div>
          </div>

          {/* Family comparison */}
          {familyComparison.length > 1 && (
            <div className="mx-4 mt-4 rounded-2xl p-4" style={{ background: '#1c1c1e', border: '1px solid #2c2c2e' }}>
              <p className="text-xs font-semibold mb-3" style={{ color: '#8e8e93', letterSpacing: 1 }}>FAMILY TODAY</p>
              <div className="space-y-2.5">
                {familyComparison.map(u => {
                  const uScore = allTodayLogs.filter(l => l.user_id === u.id).reduce((s, l) => s + (l.status === 'kazaa' ? 0.5 : 1), 0);
                  return (
                    <div key={u.id} className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0"
